<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="iconfont.css"> <!-- 引入Iconfont的CSS文件 -->
    <link rel="stylesheet" href="./CSS/Myself.css">
    <!-- 引入 Font Awesome 图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
<!--    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" integrity="sha384-o8PpIEiVgZlRzj+X5QlR7wofjqXjWVBK/KIo4U5YMh5mjqUqb50KxcF5W5z3JgWz" crossorigin="anonymous">-->
    <title>我的</title>
</head>
<body>

<header class="top-header">
    <div class="user-info">
        <div class="user-avatar">
            <img src="./images/01.jpg" alt="User Avatar">
            <div class="hidden-phone">***-***-1234</div>
        </div>
    </div>
    <div class="action-buttons">
        <button class="btn"><i class="fas fa-cog"></i></button>
        <button class="btn"><i class="fas fa-headset"></i></button>
    </div>
</header>

<div class="appointment-box">
    <div class="box-header">
        <h2>我的预约</h2>
        <span class="more-icon"><i class="fas fa-chevron-right"></i></span>
    </div>
    <div class="appointment-section">
        <div class="appointment-item">
            <i class="fas fa-calendar-check"></i>
            <p>待就诊</p>
        </div>
        <div class="appointment-item">
            <i class="fas fa-star"></i>
            <p>待评价</p>
        </div>
        <div class="appointment-item">
            <i class="fas fa-check-circle"></i>
            <p>已评价</p>
        </div>
        <div class="appointment-item">
            <i class="fas fa-history"></i>
            <p>历史</p>
        </div>
    </div>
</div>

<div class="module-box">
    <div class="module-item">
        <i class="fas fa-user"></i>
        <p>我的就诊人</p>
    </div>
    <div class="module-item">
        <i class="fas fa-comment"></i>
        <p>我的咨询</p>
    </div>
    <div class="module-item">
        <i class="fas fa-heart"></i>
        <p>我的收藏</p>
    </div>
    <div class="module-item">
        <i class="fas fa-file-alt"></i>
        <p>诊疗报告</p>
    </div>
    <div class="module-item">
        <i class="fas fa-home"></i>
        <p>我的房屋</p>
    </div>
    <div class="module-item">
        <i class="fas fa-chart-bar"></i>
        <p>数据监测</p>
    </div>
</div>

<!--底部导航-->
<div class="bottom-navbar">
    <a href="./First.html" class="nav-item">
        <i class="fas fa-home"></i>
        <span>首页</span>
    </a>
    <a href="./Analyze.html" class="nav-item">
        <i class="fas fa-robot"></i>
        <span>数据分析</span>
    </a>
    <a href="./ChatWith.html" class="nav-item">
        <i class="fas fa-comments"></i>
        <span>交流</span>
    </a>
    <a href="./Myself.html" class="nav-item">
        <i class="fas fa-user"></i>
        <span>我的</span>
    </a>
</div>
<script src="From_Shop.js"></script>
</body>
</html>
