<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../CSS/Analyze_05.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <title>小程序</title>
</head>
<body>
<header>
    <div id="icons">
        <div id="location-text-icon">
            <i class="fas fa-map-marker-alt"></i>
            <strong><span class="small-text">合肥</span></strong>
        </div>
        <div id="search-bar">
            <input type="text" id="search-input" placeholder="输入搜索内容">
            <button id="search-button"><i class="fas fa-search"></i></button>
        </div>
        <div id="chat-icon"><i class="fas fa-comments"></i></div>
    </div>
</header>
<!-- 心电图容器 -->
<div id="ecg-chart-container">
    <canvas id="ecg-chart"></canvas>

    <!-- 参数容器 -->
    <div class="parameter-container">
        <div class="parameter">
            <div class="circle"></div>
            <p>心率</p>
            <span id="heart-rate" class="wave-loader"></span>
        </div>
        <div class="parameter">
            <div class="circle"></div>
            <p>血氧</p>
            <span id="blood-oxygen" class="wave-loader"></span>
        </div>
        <div class="parameter">
            <div class="circle"></div>
            <p>心跳次数</p>
            <span id="heartbeat-count" class="wave-loader"></span>
        </div>
    </div>
</div>
<!--底部导航-->
<div class="bottom-navbar">
    <a href="../First.html" class="nav-item">
        <i class="fas fa-home"></i>
        <span>首页</span>
    </a>
    <a href="../Analyze.html" class="nav-item">
        <i class="fas fa-robot"></i>
        <span>数据分析</span>
    </a>
    <a href="../ChatWith.html" class="nav-item">
        <i class="fas fa-comments"></i>
        <span>交流</span>
    </a>
    <a href="../Myself.html" class="nav-item">
        <i class="fas fa-user"></i>
        <span>我的</span>
    </a>
</div>
<script src="../Analyze_For/Analyze_05.js"></script>
</body>
</html>
